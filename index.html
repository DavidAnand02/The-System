      // Ultimate fix for "Cannot set property fetch of #<Window> which has only a getter"

        var nativeFetch = window.fetch;

            configurable: true,

            set: function(v) { customFetch = v; }

        }

        var proxy = new Proxy(window, {
          get: function(target, prop) {
            if (prop === 'fetch') return customFetch;
            if (prop === 'global' || prop === 'globalThis' || prop === 'self') return proxy;
            
            var value = target[prop];
            if (typeof value === 'function') {

                  prop === 'Image' || prop === 'Audio' || prop === 'Option') {

              }
              try {

              } catch (e) {

              }
            }
            return value;
          },
          set: function(target, prop, value) {
            if (prop === 'fetch') {
              customFetch = value;
              return true;
            }
            try {
              target[prop] = value;

            }
            return true;
          },
          has: function(target, prop) {
